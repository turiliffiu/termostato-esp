; ============================================================
; TERMOSTATO ESP - PlatformIO Configuration
; GOLD v1.0 - ESP8266 Wemos D1 Mini
; ============================================================

[platformio]
default_envs = debug
src_dir = src
include_dir = include

[common]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/ESPAsyncTCP.git
    bblanchon/ArduinoJson@^7.2.0
    adafruit/Adafruit AHTX0@^2.0.5
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit SSD1306@^2.5.13
    knolleary/PubSubClient@^2.8.0

build_flags =
    -DFIRMWARE_VERSION=\"1.0.0\"

[env:debug]
extends = common
build_flags =
    ${common.build_flags}
    -DDEBUG=1
    -DCORE_DEBUG_LEVEL=3

[env:release]
extends = common
build_flags =
    ${common.build_flags}
    -DRELEASE=1
    -O2

[env:ota]
extends = common
upload_protocol = espota
upload_port = 192.168.1.XXX
upload_flags =
    --auth=admin
